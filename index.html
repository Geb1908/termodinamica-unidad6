<script>

// ─── CÁLCULOS ─────────────────────────────────────────────────────────────────

function calcOtto(){
  const {r,qin}=P.otto;
  const v2=v1/r, T2=T1*r**(γ-1), P2=P1*r**γ;
  const T3=T2+qin/cv, P3=P2*(T3/T2), v3=v2;
  const T4=T3*(v3/v1)**(γ-1), P4=P3*(v3/v1)**γ;
  const qout=cv*(T4-T1), wnet=qin-qout;
  const eta=1-1/r**(γ-1);             // η = 1 - r^(1-γ)
  const mep=wnet/(v1-v2);
  return {states:[{n:1,T:T1,P:P1,v:v1},{n:2,T:T2,P:P2,v:v2},{n:3,T:T3,P:P3,v:v3},{n:4,T:T4,P:P4,v:v1}],wnet,eta,mep,qin};
}

function calcDiesel(){
  const {r,rc}=P.diesel;
  const v2=v1/r, T2=T1*r**(γ-1), P2=P1*r**γ;
  // ── rc es primario: T3 = T2 * rc  (no se usa qin externo) ──
  const T3=T2*rc, v3=v2*rc, P3=P2;           // proceso 2→3 isobárico (P=cte)
  const qin=cp*(T3-T2);                       // calor derivado
  const T4=T3*(v3/v1)**(γ-1), P4=P3*(v3/v1)**γ;
  const qout=cv*(T4-T1), wnet=qin-qout;
  // Fórmula exacta del ciclo Diesel
  // Si rc=1 → (rc^γ-1)/(γ*(rc-1)) → L'Hôpital → rc^(γ-1) → 1 → η = 1-1/r^(γ-1) = η_Otto ✓
  let eta;
  if(Math.abs(rc-1)<0.001){
    eta=1-1/r**(γ-1);                         // límite rc→1 = η_Otto
  } else {
    eta=1-(1/r**(γ-1))*((rc**γ-1)/(γ*(rc-1)));
  }
  const mep=wnet/(v1-v2);
  return {states:[{n:1,T:T1,P:P1,v:v1},{n:2,T:T2,P:P2,v:v2},{n:3,T:T3,P:P3,v:v3},{n:4,T:T4,P:P4,v:v1}],wnet,eta,mep,qin};
}

function calcBrayton(){
  const {rp,qin}=P.brayton;
  const T2=T1*rp**((γ-1)/γ), P2=P1*rp, v2=Rg*T2/P2;
  const T3=T2+qin/cp, v3=Rg*T3/P2;
  const T4=T3/rp**((γ-1)/γ), v4=Rg*T4/P1;
  const qout=cp*(T4-T1), wnet=qin-qout;
  const eta=1-1/rp**((γ-1)/γ);
  const mep=wnet/(v1-v2);
  return {states:[{n:1,T:T1,P:P1,v:v1},{n:2,T:T2,P:P2,v:v2},{n:3,T:T3,P:P2,v:v3},{n:4,T:T4,P:P1,v:v4}],wnet,eta,mep,qin};
}

// ─── CURVAS P-V ───────────────────────────────────────────────────────────────

function isen(va,Pa,vb,n=60){
  const pts=[],c=Pa*va**γ;
  for(let i=0;i<=n;i++){const v=va+(vb-va)*(i/n);pts.push({x:v,y:c/v**γ});}
  return pts;
}
function isobar(va,vb,Pval,n=30){
  const pts=[];
  for(let i=0;i<=n;i++){const v=va+(vb-va)*(i/n);pts.push({x:v,y:Pval});}
  return pts;
}
function isochor(Pa,Pb,vval,n=20){
  const pts=[];
  for(let i=0;i<=n;i++){const p=Pa+(Pb-Pa)*(i/n);pts.push({x:vval,y:p});}
  return pts;
}
function buildCurve(c,st){
  const[s1,s2,s3,s4]=st;
  if(c==='otto')   return [...isen(s1.v,s1.P,s2.v),...isochor(s2.P,s3.P,s2.v),...isen(s3.v,s3.P,s4.v),...isochor(s4.P,s1.P,s1.v)];
  if(c==='diesel') return [...isen(s1.v,s1.P,s2.v),...isobar(s2.v,s3.v,s2.P),...isen(s3.v,s3.P,s4.v),...isochor(s4.P,s1.P,s1.v)];
  // Brayton
  return [...isen(s1.v,s1.P,s2.v),...isobar(s2.v,s3.v,s2.P),...isen(s3.v,s3.P,s4.v),...isobar(s4.v,s1.v,s1.P)];
}

// ─── CHART ────────────────────────────────────────────────────────────────────

function initChart(){

          callbacks:{label:c=>\`v = \${c.parsed.x.toFixed(4)} m³/kg   P = \${c.parsed.y.toFixed(0)} kPa\`}}
      },
      scales:{
        x:{title:{display:true,text:'Volumen específico v (m³/kg)',color:'#64748b',font:{size:10}},grid:{color:'rgba(148,163,184,0.07)'},ticks:{color:'#475569',font:{size:9}}},
        y:{title:{display:true,text:'Presión P (kPa)',color:'#64748b',font:{size:10}},grid:{color:'rgba(148,163,184,0.07)'},ticks:{color:'#475569',font:{size:9}}}
      }
    }
  });
  // Plugin para etiquetar los estados en el canvas
  Chart.register({id:'stateLabels',afterDraw(ch){
    if(!ch._stateData)return;
    const ctx=ch.ctx,xs=ch.scales.x,ys=ch.scales.y;
    ctx.save();
    ch._stateData.forEach(s=>{
      const x=xs.getPixelForValue(s.v), y=ys.getPixelForValue(s.P);
      ctx.fillStyle=ch._stateColor||'#fff';
      ctx.font='bold 11px Segoe UI';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(\`(\${s.n})\`,x,y-8);
    });
    ctx.restore();
  }});
}

function updateChart(c,res){
  const col=COLS[c], pts=buildCurve(c,res.states);
  chart.data.datasets=[
    {label:'Ciclo',data:pts,showLine:true,fill:true,backgroundColor:col.f,borderColor:col.l,borderWidth:2.5,pointRadius:0},
    {label:'Estados',data:res.states.map(s=>({x:s.v,y:s.P})),showLine:false,pointRadius:6,pointHoverRadius:9,backgroundColor:col.p,borderColor:'#0f172a',borderWidth:2}
  ];
  const allV=pts.map(p=>p.x), allP=pts.map(p=>p.y);
  chart.options.scales.x.min=Math.min(...allV)*0.88;
  chart.options.scales.x.max=Math.max(...allV)*1.1;
  chart.options.scales.y.min=0;
  chart.options.scales.y.max=Math.max(...allP)*1.12;
  chart._stateData=res.states; chart._stateColor=col.p;
  chart.update();
}

}

function onS(c,id,u,v){
  P[c][id]=parseFloat(v);
  const el=document.getElementById('sv-'+id);
  if(el) el.textContent=parseFloat(v).toFixed(id==='rc'?2:1)+u;
  updateAll();
}

function updateStates(states){
  document.getElementById('states-rows').innerHTML=states.map(s=>
    \`<div class="states-grid" style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
      <span class="state-n">(\${s.n})</span>
      <span>\${s.T.toFixed(0)}</span>
      <span>\${s.P.toFixed(0)}</span>
      <span>\${s.v.toFixed(4)}</span>
    </div>\`
  ).join('');
}

function updateMetrics(res){
  document.getElementById('m-wnet').textContent=res.wnet.toFixed(1);
  document.getElementById('m-mep').textContent =res.mep.toFixed(0);
  document.getElementById('m-eta').textContent =(res.eta*100).toFixed(1)+'%';
}

// ─── COMPARATIVA ─────────────────────────────────────────────────────────────
// Usa los parámetros ACTUALES de cada ciclo para la comparativa
function updateComparison(){
  const r   = P[cycle].r   || P[cycle].rp || 8;   // parámetro base de compresión

  // Otto con r actual
  const etaO = 1-1/r**(γ-1);
  const T2o=T1*r**(γ-1), T3o=T2o+P.otto.qin/cv, T4o=T3o*(1/r)**(γ-1);
  const wO=P.otto.qin - cv*(T4o-T1), mepO=wO/(v1-v1/r);

  // Diesel con r y rc ACTUALES del slider
  const rc   = P.diesel.rc;
  const T2d  = T1*r**(γ-1), T3d=T2d*rc, qinD=cp*(T3d-T2d);
  const T4d  = T3d*(rc/r)**(γ-1);
  const wD   = qinD - cv*(T4d-T1);
  const mepD = wD/(v1-v1/r);
  let etaD;
  if(Math.abs(rc-1)<0.001){ etaD=etaO; }
  else { etaD=1-(1/r**(γ-1))*((rc**γ-1)/(γ*(rc-1))); }

  // Brayton con rp actual
  const rp  = P.brayton.rp;
  const etaB=1-1/rp**((γ-1)/γ);
  const T2b=T1*rp**((γ-1)/γ), T3b=T2b+P.brayton.qin/cp, T4b=T3b/rp**((γ-1)/γ);
  const wB=P.brayton.qin - cp*(T4b-T1), v2b=Rg*T2b/(P1*rp), mepB=wB/(v1-v2b);

  const rows=[
    {n:'Otto',   c:'#60a5fa', e:etaO, w:wO, m:mepO},
    {n:'Diesel', c:'#4ade80', e:etaD, w:wD, m:mepD},
    {n:'Brayton',c:'#fb923c', e:etaB, w:wB, m:mepB}
  ].sort((a,b)=>b.e-a.e);

  const M=['🥇','🥈','🥉'];
  document.getElementById('cmp-body').innerHTML=rows.map((row,i)=>
    \`<tr><td style="color:\${row.c}">\${row.n}</td>
    <td>\${(row.e*100).toFixed(1)}%</td>
    <td>\${row.w.toFixed(1)}</td>
    <td>\${isFinite(row.m)?row.m.toFixed(0):'—'}</td>
    <td>\${M[i]}</td></tr>\`
  ).join('');
}

function updateNotes(c){
  document.getElementById('eng-notes').innerHTML=NOTES[c].map(n=>
    \`<div class="note"><span class="note-icon">\${n.i}</span><span>\${n.t}</span></div>\`
  ).join('');
}

// ─── MAIN UPDATE ─────────────────────────────────────────────────────────────

function updateAll(){
  const res=cycle==='otto' ? calcOtto() : cycle==='diesel' ? calcDiesel() : calcBrayton();
  updateChart(cycle,res);
  updateMetrics(res);
  updateStates(res.states);
  updateComparison();

  // Mostrar info de qin derivado en Diesel
  if(cycle==='diesel'){
    const el=document.getElementById('diesel-qin-info');
    el.innerHTML=\`📊 Calor aportado derivado: q_in = <b>\${res.qin.toFixed(0)} kJ/kg</b> (= c_p × T₂ × (r_c − 1))\`;
    // Chip Otto-equivalente cuando rc ≈ 1
    const chip=document.getElementById('otto-equiv-chip');
    chip.classList.toggle('visible', P.diesel.rc <= 1.01);
  }
}

function setCycle(c){
  cycle=c;
  ['otto','diesel','brayton'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    b.className='tab'+(x===c?' active-'+c:'');
  });
  document.getElementById('cycle-desc').innerHTML=DESC[c];
  const badge=document.getElementById('badge');
  badge.style.cssText=BADGES[c];
  badge.textContent='CICLO '+c.toUpperCase();
  // Chip solo visible en Diesel
  const chip=document.getElementById('otto-equiv-chip');
  chip.style.display = c==='diesel' ? '' : 'none';
  buildSliders(c);
  updateNotes(c);
  updateAll();
}

window.onload=()=>{ initChart(); setCycle('otto'); };
<\/script>
</body></html>`;

        srcDoc={html}
        style={{ width: '100%', height: '100%', border: 'none' }}
        title="Gas Power Cycle Simulator"
      />
    </div>
  );
}
